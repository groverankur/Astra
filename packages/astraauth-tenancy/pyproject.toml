[project]
name = "astraauth-tenancy"
version = "1.0.0"
description = "Astra Mandal (`astraauth-tenancy`): multi-tenant isolation routing and dynamic tenancy middleware for Astra"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Ankur Grover", email = "grover.ankur@gmail.com" }
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
keywords = ["authentication", "authorization", "tenancy", "multi-tenancy", "isolation"]

dependencies = [
    "astraauth>=1.0.0",
]

[project.urls]
Homepage = "https://astraauth.dev"
Repository = "https://github.com/groverankur/Astra"
Documentation = "https://docs.astraauth.dev"

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"

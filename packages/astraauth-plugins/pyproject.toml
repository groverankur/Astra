[project]
name = "astraauth-plugins"
version = "1.0.0"
description = "Astra Tantra (`astraauth-plugins`): tenant-aware plugin runtime, hook contracts, and built-in signal plugins for Astra"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Ankur Grover", email = "grover.ankur@gmail.com" }
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
keywords = ["authentication", "authorization", "plugins", "extensions"]

dependencies = [
    "astraauth>=1.0.0",
    "cryptography",
    "packaging",
]

[project.urls]
Homepage = "https://astraauth.dev"
Repository = "https://github.com/groverankur/Astra"
Documentation = "https://docs.astraauth.dev"

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
[dependency-groups]
dev = [
    "ty>=0.0.51",
    "pre-commit>=4.5.1",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.14.11",
]


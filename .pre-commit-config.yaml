# Pre-commit configuration utilizing local uv hooks for maximum performance
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true

      - id: bandit
        name: bandit security check
        entry: uv run bandit -r src/ packages/ -s B101,B105,B106,B110,B608
        language: system
        types: [python]
        pass_filenames: false

      - id: pip-audit
        name: pip dependency audit
        entry: uv run pip-audit
        language: system
        pass_filenames: false

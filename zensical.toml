[project]
site_name = "Astra Docs"
site_description = "Astra is a package-first authentication and authorization platform for Python"
site_author = "Ankur Grover"
site_url = "https://docs.astraauth.dev/"
repo_name = "groverankur/Astra"
repo_url = "https://github.com/groverankur/Astra"
edit_uri = "edit/main/docs/"
copyright = "Copyright © 2026 Ankur Grover"
extra_css = ["stylesheets/extra.css"]
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Installation" = "getting-started/installation.md"},
    {"Quick Start" = "getting-started/quick-start.md"},
    {"Configuration" = "getting-started/configuration.md"},
  ]},
  {"User Guide" = [
    {"Authentication" = "user-guide/authentication.md"},
    {"Authorization" = "user-guide/authorization.md"},
    {"Abuse Controls and Safety" = "user-guide/abuse-controls.md"},
    {"Multi-Factor Authentication" = "user-guide/mfa.md"},
    {"OIDC Federation" = "user-guide/oidc-federation.md"},
    {"Plugins" = "user-guide/plugins.md"},
    {"ReBAC Access Policies" = "user-guide/rebac-policies.md"},
    {"Multi-Tenancy Isolation" = "user-guide/multi-tenancy.md"},
  ]},
  {"Examples" = [
    {"Index" = "examples/index.md"},
    {"Bootstrap Runtime" = "examples/bootstrap-runtime.md"},
  ]},
  {"Platform" = [
    {"Architecture" = "about/architecture.md"},
    {"Package Summary" = "about/package-summary.md"},
    {"AstraAuth System Context, Architecture & Workflow Reference" = "about/architecture_and_workflows.md"},
    {"Package-by-Package Context, Architecture & Workflows" = "about/package_detailed_references.md"},
  ]},
  {"API Reference" = [
    {"Core" = "api/core.md"},
    {"Adapters" = "api/adapters.md"},
    {"Service" = "api/service.md"},
    {"Plugins" = "api/plugins.md"},
    {"IdP" = "api/idp.md"},
    {"WebAuthn" = "api/webauthn.md"},
    {"Policy" = "api/policy.md"},
    {"Tenancy" = "api/tenancy.md"},
    {"CLI" = "api/cli.md"},
    {"Admin UI" = "api/admin-ui.md"},
  ]},
  {"About" = [
    {"Changelog" = "about/changelog.md"},
    {"License" = "about/license.md"},
    {"Contributing" = "about/contributing.md"},
    {"Security" = "about/security.md"},
  ]},
]

[project.theme]
name = "material"
variant = "classic"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "navigation.expand",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.plugins.autorefs]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
heading_level = 1
inherited_members = true
merge_init_into_class = true
show_root_heading = true
show_root_toc_entry = true
show_source = false
show_submodules = true
summary = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true



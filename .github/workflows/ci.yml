name: Continuous Integration & Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Code Quality, Type Check & Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv Package Manager
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "latest"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Synchronize Workspace dependencies
        run: uv sync --all-groups --all-extras

      - name: Verify Code Style and Format
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Bandit Security Scanning
        run: uv run bandit -r src/ packages/ -s B101,B105,B106,B110,B608

      - name: Run Semgrep Static Security Scan
        run: |
          pip install semgrep
          semgrep --config auto --error

      - name: Audit Third-Party Dependencies (pip-audit)
        run: uv run pip-audit

      - name: Run Ty Static Type Checks
        run: uv run ty check .

      - name: Run Pytest Suite
        run: uv run pytest

  deploy-docs:
    name: Build & Deploy Documentation to Pages
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build & Publish Zensical Docs
        uses: cssnr/zensical-action@fd73e847ab603a83970fc530a3a17c19fa19e407 # v1.0.8
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prepare: uv tool install --force --with mkdocstrings --with mkdocstrings-python zensical==$ZENSICAL_VERSION

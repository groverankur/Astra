name: Continuous Integration & Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Code Quality, Type Check & Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv Package Manager
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "latest"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Synchronize Workspace dependencies
        run: uv sync --all-groups --all-extras

      - name: Verify Code Style and Format
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Bandit Security Scanning
        run: uv run bandit -c pyproject.toml -r src/ packages/

      - name: Run Semgrep Static Security Scan
        run: |
          pip install semgrep
          semgrep --config auto --error

      - name: Audit Third-Party Dependencies (pip-audit)
        run: uv run pip-audit

      - name: Run Ty Static Type Checks
        run: uv run ty check .

      - name: Run Pytest Suite
        run: uv run pytest

  deploy-docs:
    name: Build & Deploy Documentation to Pages
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv Package Manager
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "latest"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Synchronize Workspace dependencies
        run: uv sync --all-groups --all-extras

      - name: Build Zensical Docs
        run: uv run zensical build -c

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
